name: Daily AI Trend Digest

on:
  schedule:
    # 12:00 UTC every day
    - cron: "0 12 * * *"
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-trend-finder .

      - name: Ensure history file exists
        run: test -f .trend-history.json || echo '{}' > .trend-history.json

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: >
          docker run --rm
          -e SLACK_WEBHOOK_URL
          -v ${{ github.workspace }}/.trend-history.json:/app/.trend-history.json
          ai-trend-finder --slack

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .trend-history.json
          git diff --cached --quiet || git commit -m "Update trend history [skip ci]"
          git push
